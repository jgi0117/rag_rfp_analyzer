base_config: "configs/base.yaml"

preprocessing:
  splitter: markdown
  chunk_size: 600
  chunk_overlap: 100
  min_chunk_len: 10

embedding:
  provider: huggingface
  model: BAAI/bge-m3

retrieval:
  vector_store: chroma
  top_k: 4
  sample_query: "서울캠퍼스와 세종캠퍼스의 교직원 현황 및 전임교원 수는 어떻게 되나요?"
  sample_document_id: korea_portal

generation:
  provider: huggingface
  engine: vllm
  model: Qwen/Qwen3-8B
  batch_size: 16
  temperature: 0.0
  max_new_tokens: 512
  judge_model: gpt-4o-mini

output:
  evaluation_dir: "outputs/evaluation"
  strategy_name: "vllm_batch_16"
  chunk_results: "outputs/chunks/baseline_{strategy_name}_chunks.csv"
  retrieval_eval_results: "outputs/evaluation/baseline_{strategy_name}_retrieval_results.csv"
  retrieval_eval_summary: "outputs/evaluation/baseline_{strategy_name}_retrieval_summary.csv"
  generation_eval_results: "outputs/evaluation/baseline_{strategy_name}_generation_results.csv"
  generation_eval_summary: "outputs/evaluation/baseline_{strategy_name}_generation_summary.csv"
