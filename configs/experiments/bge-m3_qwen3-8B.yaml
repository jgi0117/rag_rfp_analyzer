base_config: "configs/base.yaml"

preprocessing:
  splitter: markdown
  chunk_size: 600
  chunk_overlap: 100
  min_chunk_len: 10

embedding:
  provider: huggingface
  model: BAAI/bge-m3

retrieval:
  vector_store: chroma
  top_k: 4
  sample_query: "?쒖슱罹좏띁?ㅼ? ?몄쥌罹좏띁?ㅼ쓽 援먯쭅???꾪솴 諛??꾩엫援먯썝 ?섎뒗 ?대뼸寃??섎굹??"
  sample_document_id: korea_portal
  persist_directory: "outputs/db/baseline_markdown_600_100_top4_bge-m3_qwen3-8B"

generation:
  provider: huggingface
  model: Qwen/Qwen3-8B
  temperature: 0.0
  max_new_tokens: 512

output:
  evaluation_dir: "outputs/evaluation"
  strategy_name: "baseline_markdown_600_100_top4_bge-m3_qwen3-8B"
  chunk_results: "outputs/chunks/baseline_markdown_600_100_top4_bge-m3_qwen3-8B_chunks.csv"
  retrieval_eval_results: "outputs/evaluation/baseline_markdown_600_100_top4_bge-m3_qwen3-8B_retrieval_results.csv"
  retrieval_eval_summary: "outputs/evaluation/baseline_markdown_600_100_top4_bge-m3_qwen3-8B_retrieval_summary.csv"
  generation_eval_results: "outputs/evaluation/baseline_markdown_600_100_top4_bge-m3_qwen3-8B_generation_results.csv"
  generation_eval_summary: "outputs/evaluation/baseline_markdown_600_100_top4_bge-m3_qwen3-8B_generation_summary.csv"
