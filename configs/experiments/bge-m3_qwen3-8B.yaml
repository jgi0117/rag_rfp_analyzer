base_config: "configs/base.yaml"

preprocessing:
  splitter: markdown
  chunk_size: 900
  chunk_overlap: 270
  min_chunk_len: 10

embedding:
  provider: huggingface
  model: BAAI/bge-m3

retrieval:
  vector_store: chroma
  top_k: 10
  sample_query: "서울캠퍼스와 세종캠퍼스의 교직원 현황 및 전임교원 수는 어떻게 되나요?"
  sample_document_id: korea_portal
  persist_directory: "outputs/db/baseline_markdown_600_100_top4_bge-m3_qwen3-8B"

generation:
  provider: huggingface
  model: Qwen/Qwen3-8B
  temperature: 0.0
  max_new_tokens: 256
  judge_model: gpt-4o-mini

output:
  evaluation_dir: "outputs/evaluation"
  strategy_name: "max_chunk_256_TopK_10_Chunk_size_900_Overlap_270"
  chunk_results: "outputs/chunks/baseline_max_chunk_256_TopK_10_Chunk_size_900_Overlap_270_chunks.csv"
  retrieval_eval_results: "outputs/evaluation/baseline_max_chunk_256_TopK_10_Chunk_size_900_Overlap_270_retrieval_results.csv"
  retrieval_eval_summary: "outputs/evaluation/baseline_max_chunk_256_TopK_10_Chunk_size_900_Overlap_270_retrieval_summary.csv"
  generation_eval_results: "outputs/evaluation/baseline_max_chunk_256_TopK_10_Chunk_size_900_Overlap_270_generation_results.csv"
  generation_eval_summary: "outputs/evaluation/baseline_max_chunk_256_TopK_10_Chunk_size_900_Overlap_270_generation_summary.csv"
