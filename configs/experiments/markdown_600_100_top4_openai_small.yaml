base_config: "configs/base.yaml"

preprocessing:
  splitter: markdown
  chunk_size: 600
  chunk_overlap: 100
  min_chunk_len: 10

embedding:
  provider: openai
  model: text-embedding-3-small

retrieval:
  vector_store: chroma
  top_k: 4
  sample_query: "서울캠퍼스와 세종캠퍼스의 교직원 현황 및 전임교원 수는 어떻게 되나요?"
  sample_document_id: korea_portal
  persist_directory: "outputs/db/markdown_600_100_top4_openai_small_multidoc5"

generation:
  provider: openai
  model: gpt-5-mini
  temperature: 0.0

output:
  evaluation_dir: "outputs/evaluation"
  strategy_name: "markdown_600_100_top4_openai_small_multidoc5"
  chunk_results: "outputs/chunks/markdown_600_100_top4_openai_small_multidoc5_chunks.csv"
  retrieval_eval_results: "outputs/evaluation/markdown_600_100_top4_openai_small_multidoc5_results.csv"
  retrieval_eval_summary: "outputs/evaluation/markdown_600_100_top4_openai_small_multidoc5_summary.csv"
  generation_eval_results: "outputs/evaluation/markdown_600_100_top4_openai_small_multidoc5_gpt5_mini_generation_results.csv"
  generation_eval_summary: "outputs/evaluation/markdown_600_100_top4_openai_small_multidoc5_gpt5_mini_generation_summary.csv"
