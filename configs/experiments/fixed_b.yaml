base_config: "configs/base.yaml"

preprocessing:
  splitter: fixed_size
  chunk_size: 500
  chunk_overlap: 0
  min_chunk_len: 10

embedding:
  provider: openai
  model: text-embedding-3-small

retrieval:
  vector_store: chroma
  top_k: 3
  sample_query: "서울캠퍼스와 세종캠퍼스의 교직원 현황 및 전임교원 수는 어떻게 되나요?"
  persist_directory: "outputs/db/chroma_db_scenario_b"

output:
  evaluation_dir: "outputs/evaluation"
  strategy_name: "scenario_b_openai_fixed_500_overlap_0"
  chunk_results: "outputs/chunks/scenario_b_chunks.csv"
  retrieval_eval_results: "outputs/evaluation/scenario_b_retrieval_eval_results.csv"
  retrieval_eval_summary: "outputs/evaluation/scenario_b_retrieval_eval_summary.csv"
