base_config: "configs/base.yaml"

preprocessing:
  splitter: semantic
  chunk_size: 600
  chunk_overlap: 100
  min_chunk_len: 10

embedding:
  provider: openai
  model: text-embedding-3-small

retrieval:
  vector_store: chroma
  top_k: 4
  sample_query: "서울캠퍼스와 세종캠퍼스의 교직원 현황 및 전임교원 수는 어떻게 되나요?"
  persist_directory: "outputs/db/semantic_600_100_top4_openai_small"

output:
  evaluation_dir: "outputs/evaluation"
  strategy_name: "semantic_600_100_top4_openai_small"
  chunk_results: "outputs/chunks/semantic_600_100_top4_openai_small_chunks.csv"
  retrieval_eval_results: "outputs/evaluation/semantic_600_100_top4_openai_small_results.csv"
  retrieval_eval_summary: "outputs/evaluation/semantic_600_100_top4_openai_small_summary.csv"
