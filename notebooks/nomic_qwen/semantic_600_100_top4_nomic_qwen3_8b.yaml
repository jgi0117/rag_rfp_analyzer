base_config: "configs/base.yaml"

preprocessing:
  splitter: semantic
  chunk_size: 600
  chunk_overlap: 100
  min_chunk_len: 10

embedding:
  provider: huggingface
  model: nomic-ai/nomic-embed-text-v2-moe

retrieval:
  vector_store: chroma
  top_k: 4
  sample_query: "서울캠퍼스와 세종캠퍼스의 교직원 현황 및 전임교원 수는 어떻게 되나요?"
  sample_document_id: korea_portal
  persist_directory: "outputs/db/reference_semantic_600_100_top4_nomic_multidoc5"

generation:
  provider: huggingface
  model: Qwen/Qwen3-8B
  temperature: 0.0
  judge_model: gpt-4o-mini

output:
  evaluation_dir: "outputs/evaluation"
  strategy_name: "reference_semantic_600_100_top4_nomic_multidoc5"
  chunk_results: "outputs/chunks/reference_semantic_600_100_top4_nomic_multidoc5_chunks.csv"
  retrieval_eval_results: "outputs/evaluation/reference_semantic_600_100_top4_nomic_multidoc5_results.csv"
  retrieval_eval_summary: "outputs/evaluation/reference_semantic_600_100_top4_nomic_multidoc5_summary.csv"
  generation_eval_results: "outputs/evaluation/reference_semantic_600_100_top4_nomic_multidoc5_qwen3_8b_generation_results.csv"
  generation_eval_summary: "outputs/evaluation/reference_semantic_600_100_top4_nomic_multidoc5_qwen3_8b_generation_summary.csv"
